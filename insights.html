<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOAS Inquiry Insights</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/assets/css/style.css?v=20260330a">
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico">
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo" aria-label="AOAS homepage">
                    <img src="/assets/images/brand/aoas-logo.png" alt="AOAS Logo" class="logo-icon">
                    <span class="logo-text"><span class="logo-text-full">Attainment Office Administrative Services</span><span
                            class="logo-text-short">AOAS</span></span>
                </a>
                <div class="header-actions">
                    <a href="/" class="btn btn-primary">HOME</a>
                    <a href="/services" class="btn btn-primary">SERVICES</a>
                </div>
            </div>
        </div>
    </header>

    <main class="page-shell">
        <section class="page-hero">
            <h1>Inquiry & Chat Metrics</h1>
            <p>Live view of tracked events and inquiry submissions from the website form and chatbot.</p>
        </section>

        <div style="display:flex; gap:10px; margin-bottom: 12px; flex-wrap:wrap;">
            <button id="refreshMetrics" class="pill-btn primary" type="button">Refresh Metrics</button>
            <span id="metricsStatus" style="font-size:0.9rem; color:#334155; align-self:center;"></span>
        </div>

        <section class="insights-grid" id="totalsGrid"></section>

        <section class="insights-table-wrap" style="margin-top: 14px;">
            <table class="insights-table" id="breakdownTable">
                <thead>
                    <tr>
                        <th>Metric</th>
                        <th>Value</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <section class="insights-table-wrap" style="margin-top: 14px;">
            <table class="insights-table" id="recentInquiriesTable">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Service</th>
                        <th>Source</th>
                        <th>Location</th>
                        <th>Inquiry Type</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>

    <script src="/assets/js/theme-toggle.js?v=20260306a"></script>
    <script src="/assets/js/tracker.js"></script>
    <script src="/assets/js/site-alert.js?v=20260330c"></script>
    <script src="/assets/js/insights.js?v=20260312a"></script>
</body>

</html>
